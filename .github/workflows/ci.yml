  interop-arrow-cpp-version-smoke:
    name: IPC Interop Smoke (Arrow C++ ${{ matrix.arrow_cpp_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arrow_cpp_version: ["23.0.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Conda (arrow-cpp)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: arrow-cpp-env
          channels: conda-forge
          python-version: "3.11"

      - name: Install Arrow C++ toolchain
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          conda install -y arrow-cpp=${{ matrix.arrow_cpp_version }} pkg-config cxx-compiler

      - name: Build C++ interop tool
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          mkdir -p .interop-bin .interop-fixtures
          c++ -std=c++17 tools/interop/cpp/interop.cpp -o .interop-bin/interop_cpp $(pkg-config --cflags --libs arrow)

      - name: Generate Zig fixtures (smoke)
        run: |
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream

      - name: Arrow C++ smoke generate + validate
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp.arrow canonical stream
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow.arrow canonical stream

      - name: Validate Arrow C++ fixture with zarrow (smoke)
        run: |
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp.arrow canonical stream
