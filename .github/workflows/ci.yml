name: CI

on:
  push:
    branches: [ "master"]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fuzz-corpus:
    name: Fuzz Corpus Replay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Replay fuzz corpus seeds
        run: zig build fuzz-corpus

  test:
    name: Test on ${{ matrix.os }} with Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        zig: ["0.15.1", "0.15.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "${{ matrix.zig }}"

      - name: Install zstd/lz4 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libzstd-dev liblz4-dev

      - name: Install zstd/lz4 (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd lz4

      - name: Install zstd/lz4 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\vcpkg" }
          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            git clone https://github.com/microsoft/vcpkg $vcpkgRoot
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }
          & "$vcpkgRoot\vcpkg.exe" install zstd:x64-windows lz4:x64-windows

          $installed = Join-Path $vcpkgRoot "installed\x64-windows"
          "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LIB=$installed\lib;$installed\debug\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "INCLUDE=$installed\include;$env:INCLUDE" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PATH=$installed\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ZARROW_ZSTD_LIB=$installed\bin\zstd.dll" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ZARROW_LZ4_LIB=$installed\bin\lz4.dll" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run tests
        run: zig build test

      - name: CI diagnostics (Linux, on failure)
        if: ${{ failure() && runner.os == 'Linux' }}
        run: |
          mkdir -p diagnostics
          logfile="diagnostics/ci-diagnostics-linux.txt"
          {
            echo "=== Zig diagnostics ==="
            zig version || true
            zig env || true
            echo "=== Compression tool versions ==="
            zstd --version || true
            lz4 --version || true
            echo "=== Installed packages ==="
            dpkg -l | grep -E 'libzstd|liblz4' || true
            echo "=== Dynamic linker cache ==="
            ldconfig -p | grep -E 'zstd|lz4' || true
            echo "=== Relevant environment variables ==="
            env | grep -E 'ZARROW_|VCPKG_|LD_LIBRARY_PATH|LIBRARY_PATH|PATH' || true
            echo "=== Re-run compression dependency probe ==="
            zig build check-ipc-compression-deps || true
          } 2>&1 | tee "$logfile"

      - name: CI diagnostics (macOS, on failure)
        if: ${{ failure() && runner.os == 'macOS' }}
        run: |
          mkdir -p diagnostics
          logfile="diagnostics/ci-diagnostics-macos.txt"
          {
            echo "=== Zig diagnostics ==="
            zig version || true
            zig env || true
            echo "=== Compression tool versions ==="
            zstd --version || true
            lz4 --version || true
            echo "=== Homebrew packages ==="
            brew list --versions zstd lz4 || true
            echo "=== Dynamic linker hints ==="
            ls -l /opt/homebrew/lib/libzstd* /opt/homebrew/lib/liblz4* 2>/dev/null || true
            ls -l /usr/local/lib/libzstd* /usr/local/lib/liblz4* 2>/dev/null || true
            echo "=== Relevant environment variables ==="
            env | grep -E 'ZARROW_|VCPKG_|DYLD_LIBRARY_PATH|LIBRARY_PATH|PATH' || true
            echo "=== Re-run compression dependency probe ==="
            zig build check-ipc-compression-deps || true
          } 2>&1 | tee "$logfile"

      - name: CI diagnostics (Windows, on failure)
        if: ${{ failure() && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path diagnostics -Force | Out-Null
          $logFile = Join-Path "diagnostics" "ci-diagnostics-windows.txt"
          & {
            Write-Host "=== Zig diagnostics ==="
            zig version
            zig env
            Write-Host "=== Compression tool versions ==="
            zstd --version
            lz4 --version
            Write-Host "=== Relevant environment variables ==="
            Get-ChildItem Env: | Where-Object { $_.Name -match '^(ZARROW_|VCPKG_|LIB$|INCLUDE$|PATH$)' } | Sort-Object Name
            Write-Host "=== vcpkg libraries ==="
            if ($env:VCPKG_INSTALLATION_ROOT) {
              $installed = Join-Path $env:VCPKG_INSTALLATION_ROOT "installed\x64-windows"
              Get-ChildItem "$installed\bin\zstd*.dll" -ErrorAction SilentlyContinue
              Get-ChildItem "$installed\bin\lz4*.dll" -ErrorAction SilentlyContinue
            }
            Write-Host "=== Re-run compression dependency probe ==="
            zig build check-ipc-compression-deps
          } 2>&1 | Tee-Object -FilePath $logFile

      - name: Upload failure diagnostics artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-diagnostics-${{ matrix.os }}-zig-${{ matrix.zig }}
          path: diagnostics/**
          if-no-files-found: warn
          retention-days: 14

  benchmark-ci-check:
    name: Benchmark CI CSV Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate benchmark CI CSV
        run: |
          export ZARROW_GIT_SHA="$(git rev-parse --short=12 HEAD)"
          zig build benchmark-ci 2>&1 | tee benchmark-ci.csv

      - name: Validate benchmark CI CSV format
        run: python3 tools/benchmark_ci_check.py benchmark-ci.csv

      - name: Run benchmark CI checker unit tests
        run: python3 tools/test_benchmark_ci_check.py

  pyarrow-fixture-check:
    name: PyArrow Fixture Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Regenerate IPC fixtures
        run: python tools/generate_ipc_fixtures.py

      - name: Ensure fixtures are up to date
        run: git diff --exit-code -- src/ipc/testdata

  interop-pyarrow:
    name: IPC Interop (zarrow <-> PyArrow)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex.arrow complex stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension.arrow extension stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view.arrow view stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex_file.arrow complex file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension_file.arrow extension file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view_file.arrow view file

      - name: PyArrow roundtrip checks
        run: |
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow.arrow canonical stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow.arrow canonical stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_dict_delta.arrow dict-delta stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree.arrow ree stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree.arrow ree stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int16.arrow ree-int16 stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int64.arrow ree-int64 stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_complex.arrow complex stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_complex.arrow complex stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_complex.arrow complex stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_extension.arrow extension stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_extension.arrow extension stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_extension.arrow extension stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_view.arrow view stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_view.arrow view stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_view.arrow view stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_file.arrow canonical file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_file.arrow ree file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_file.arrow ree file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_file.arrow ree file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int16_file.arrow ree-int16 file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int64_file.arrow ree-int64 file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_complex_file.arrow complex file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_complex_file.arrow complex file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_complex_file.arrow complex file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_extension_file.arrow extension file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_extension_file.arrow extension file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_extension_file.arrow extension file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_view_file.arrow view file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_view_file.arrow view file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_view_file.arrow view file

  interop-arrow-rs:
    name: IPC Interop (zarrow <-> arrow-rs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex.arrow complex stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension.arrow extension stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view.arrow view stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex_file.arrow complex file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension_file.arrow extension file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view_file.arrow view file

      - name: Arrow-RS roundtrip checks
        run: |
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs.arrow canonical stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow.arrow canonical stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_dict_delta.arrow dict-delta stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree.arrow ree stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree.arrow ree stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int16.arrow ree-int16 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int64.arrow ree-int64 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_complex.arrow complex stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_complex.arrow complex stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_complex.arrow complex stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_extension.arrow extension stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_extension.arrow extension stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_extension.arrow extension stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_view.arrow view stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_view.arrow view stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_view.arrow view stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_file.arrow canonical file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_file.arrow canonical file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree_file.arrow ree file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_file.arrow ree file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree_file.arrow ree file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int16_file.arrow ree-int16 file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int64_file.arrow ree-int64 file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_complex_file.arrow complex file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_complex_file.arrow complex file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_complex_file.arrow complex file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_extension_file.arrow extension file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_extension_file.arrow extension file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_extension_file.arrow extension file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_view_file.arrow view file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_view_file.arrow view file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_view_file.arrow view file

  interop-arrow-cpp:
    name: IPC Interop (zarrow <-> Arrow C++)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Conda (arrow-cpp)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: arrow-cpp-env
          channels: conda-forge
          python-version: "3.11"

      - name: Install Arrow C++ toolchain
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          conda install -y arrow-cpp=23.0.1 pkg-config cxx-compiler

      - name: Build C++ interop tool
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          mkdir -p .interop-bin
          c++ -std=c++17 tools/interop/cpp/interop.cpp -o .interop-bin/interop_cpp $(pkg-config --cflags --libs arrow)

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex.arrow complex stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension.arrow extension stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view.arrow view stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex_file.arrow complex file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension_file.arrow extension file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view_file.arrow view file

      - name: Arrow C++ generate fixtures
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp.arrow canonical stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_dict_delta.arrow dict-delta stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_ree.arrow ree stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_ree_int16.arrow ree-int16 stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_ree_int64.arrow ree-int64 stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_complex.arrow complex stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_extension.arrow extension stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_view.arrow view stream
