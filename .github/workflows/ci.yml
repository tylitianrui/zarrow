        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          conda install -y arrow-cpp=23.0.1 pkg-config cxx-compiler

      - name: Build zarrow C ABI shared library
        run: |
          zig build c-api-lib

      - name: Build C ABI smoke tool
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          mkdir -p .interop-bin
          c++ -std=c++17 tools/interop/cpp/c_abi_smoke.cpp \
            -Iinclude \
            -Lzig-out/lib \
            -Wl,-rpath,"$PWD/zig-out/lib" \
            -lzarrow_c \
            -o .interop-bin/c_abi_smoke \
            $(pkg-config --cflags --libs arrow)

      - name: Run C ABI smoke
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
