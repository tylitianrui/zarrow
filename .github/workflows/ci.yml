name: CI

on:
  push:
    branches: [ "master"]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fuzz-corpus:
    name: Fuzz Corpus Replay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Replay fuzz corpus seeds
        run: zig build fuzz-corpus

  test:
    name: Test on ${{ matrix.os }} with Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        zig: ["0.15.1", "0.15.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "${{ matrix.zig }}"

      - name: Run tests
        run: zig build test

  benchmark-ci-check:
    name: Benchmark CI CSV Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate benchmark CI CSV
        run: |
          export ZARROW_GIT_SHA="$(git rev-parse --short=12 HEAD)"
          zig build benchmark-ci 2>&1 | tee benchmark-ci.csv

      - name: Validate benchmark CI CSV format
        run: python3 tools/benchmark_ci_check.py benchmark-ci.csv

      - name: Run benchmark CI checker unit tests
        run: python3 tools/test_benchmark_ci_check.py

  pyarrow-fixture-check:
    name: PyArrow Fixture Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Regenerate IPC fixtures
        run: python tools/generate_ipc_fixtures.py

      - name: Ensure fixtures are up to date
        run: git diff --exit-code -- src/ipc/testdata

  interop-pyarrow:
    name: IPC Interop (zarrow <-> PyArrow)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex.arrow complex stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex_file.arrow complex file

      - name: PyArrow roundtrip checks
        run: |
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow.arrow canonical stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow.arrow canonical stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_dict_delta.arrow dict-delta stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree.arrow ree stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree.arrow ree stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_complex.arrow complex stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_complex.arrow complex stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_complex.arrow complex stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_file.arrow canonical file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_file.arrow ree file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_file.arrow ree file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_file.arrow ree file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_complex_file.arrow complex file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_complex_file.arrow complex file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_complex_file.arrow complex file

  interop-arrow-rs:
    name: IPC Interop (zarrow <-> arrow-rs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file

      - name: Arrow-RS roundtrip checks
        run: |
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs.arrow canonical stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow.arrow canonical stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_dict_delta.arrow dict-delta stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree.arrow ree stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree.arrow ree stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_file.arrow canonical file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_file.arrow canonical file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs_ree_file.arrow ree file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_file.arrow ree file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow_ree_file.arrow ree file

  interop-arrow-cpp:
    name: IPC Interop (zarrow <-> Arrow C++)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Conda (arrow-cpp)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: arrow-cpp-env
          channels: conda-forge
          python-version: "3.11"

      - name: Install Arrow C++ toolchain
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          conda install -y arrow-cpp pkg-config cxx-compiler

      - name: Build C++ interop tool
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          mkdir -p .interop-bin
          c++ -std=c++17 tools/interop/cpp/interop.cpp -o .interop-bin/interop_cpp $(pkg-config --cflags --libs arrow)

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file

      - name: Arrow C++ generate fixtures
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp.arrow canonical stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_dict_delta.arrow dict-delta stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_ree.arrow ree stream
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_file.arrow canonical file
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp_ree_file.arrow ree file

      - name: Validate Arrow C++ fixtures with zarrow
        run: |
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp_ree_file.arrow ree file

      - name: Arrow C++ validate zarrow fixtures
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow.arrow canonical stream
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow_ree.arrow ree stream
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow_file.arrow canonical file
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow_ree_file.arrow ree file
