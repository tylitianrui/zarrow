name: CI

on:
  push:
    branches: [ "master", "release/zig-0.14" ]
  pull_request:
    branches: [ "master", "release/zig-0.14" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint (Zig fmt check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Rust (interop lint)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go (interop lint)
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"

      - name: Check Zig formatting
        run: |
          files="$(git ls-files '*.zig')"
          if [ -z "$files" ]; then
            echo "No Zig files found."
            exit 0
          fi
          echo "$files" | xargs zig fmt --check

      - name: Check Python syntax
        run: python -m compileall -q tools

      - name: Check Rust interop tool builds
        run: cargo check --manifest-path tools/interop/arrow-rs/Cargo.toml

      - name: Check Go interop tool builds
        run: |
          cd tools/interop/arrow-go
          go build ./...

  fuzz-corpus:
    name: Fuzz Corpus Replay
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Replay fuzz corpus seeds
        run: zig build fuzz-corpus

      - name: Random fuzz smoke for ArrayData.validateLayout
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .fuzz-smoke
          for i in $(seq 1 30); do
            size=$(( (RANDOM % 512) + 1 ))
            head -c "$size" /dev/urandom > .fuzz-smoke/layout.bin
            zig build fuzz-array-layout -- .fuzz-smoke/layout.bin
          done

      - name: Random fuzz smoke for IPC reader
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .fuzz-smoke
          for i in $(seq 1 30); do
            size=$(( (RANDOM % 4096) + 1 ))
            head -c "$size" /dev/urandom > .fuzz-smoke/ipc.bin
            zig build fuzz-ipc-reader -- .fuzz-smoke/ipc.bin
          done

  test:
    name: Test on ${{ matrix.os }} with Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        zig: ["0.14.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "${{ matrix.zig }}"

      - name: Run tests (all matrix targets except Linux examples lane)
        if: ${{ !(runner.os == 'Linux' && matrix.zig == '0.14.1') }}
        run: zig build test

      - name: Run tests then examples serially (Linux Zig 0.14.1)
        if: ${{ runner.os == 'Linux' && matrix.zig == '0.14.1' }}
        run: |
          zig build test
          zig build examples

      - name: CI diagnostics (Linux, on failure)
        if: ${{ failure() && runner.os == 'Linux' }}
        run: |
          mkdir -p diagnostics
          logfile="diagnostics/ci-diagnostics-linux.txt"
          {
            echo "=== Zig diagnostics ==="
            zig version || true
            zig env || true
            echo "=== Vendored compression sources ==="
            find vendor -maxdepth 3 -type f | sort || true
            echo "=== Re-run compression dependency probe ==="
            zig build check-ipc-compression-deps || true
          } 2>&1 | tee "$logfile"

      - name: CI diagnostics (macOS, on failure)
        if: ${{ failure() && runner.os == 'macOS' }}
        run: |
          mkdir -p diagnostics
          logfile="diagnostics/ci-diagnostics-macos.txt"
          {
            echo "=== Zig diagnostics ==="
            zig version || true
            zig env || true
            echo "=== Vendored compression sources ==="
            find vendor -maxdepth 3 -type f | sort || true
            echo "=== Re-run compression dependency probe ==="
            zig build check-ipc-compression-deps || true
          } 2>&1 | tee "$logfile"

      - name: CI diagnostics (Windows, on failure)
        if: ${{ failure() && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path diagnostics -Force | Out-Null
          $logFile = Join-Path "diagnostics" "ci-diagnostics-windows.txt"
          & {
            Write-Host "=== Zig diagnostics ==="
            zig version
            zig env
            Write-Host "=== Vendored compression sources ==="
            Get-ChildItem -Recurse -File vendor | Sort-Object FullName
            Write-Host "=== Re-run compression dependency probe ==="
            zig build check-ipc-compression-deps
          } 2>&1 | Tee-Object -FilePath $logFile

      - name: Upload failure diagnostics artifact
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: failure-diagnostics-${{ matrix.os }}-zig-${{ matrix.zig }}
          path: diagnostics/**
          if-no-files-found: warn
          retention-days: 14

  benchmark-ci-check:
    name: Benchmark CI CSV Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate benchmark CI CSV
        run: |
          export ZARROW_GIT_SHA="$(git rev-parse --short=12 HEAD)"
          zig build benchmark-ci 2>&1 | tee benchmark-ci.csv

      - name: Validate benchmark CI CSV format
        run: python3 tools/benchmark_ci_check.py benchmark-ci.csv

      - name: Validate benchmark CI regression thresholds
        run: python3 tools/benchmark_ci_regression_check.py benchmark-ci.csv tools/benchmark_ci_thresholds.json

      - name: Run benchmark CI checker unit tests
        run: |
          python3 tools/test_benchmark_ci_check.py
          python3 tools/test_benchmark_ci_regression_check.py

  pyarrow-fixture-check:
    name: PyArrow Fixture Check (${{ matrix.pyarrow_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pyarrow_version: ["23.0.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==${{ matrix.pyarrow_version }}

      - name: Regenerate IPC fixtures
        run: python tools/generate_ipc_fixtures.py

      - name: Ensure fixtures are up to date
        run: git diff --exit-code -- src/ipc/testdata

  compute-pyarrow-compat:
    name: Compute Compat (PyArrow ${{ matrix.pyarrow_version }} / ${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pyarrow_version: ["23.0.1"]
        suite: ["numeric", "nulls", "boundary", "chunked"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==${{ matrix.pyarrow_version }}

      - name: Compute compatibility against pyarrow.compute
        run: python tools/compute/pyarrow_compute_compat.py --suite ${{ matrix.suite }}

  interop-pyarrow-version-smoke:
    name: IPC Interop Smoke (PyArrow ${{ matrix.pyarrow_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pyarrow_version: ["22.0.0", "23.0.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==${{ matrix.pyarrow_version }}

      - name: PyArrow smoke roundtrip (canonical stream+file)
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_tensor.arrow tensor stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow.arrow canonical stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow.arrow canonical stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_tensor.arrow tensor stream


  interop-pyarrow:
    name: IPC Interop (zarrow <-> PyArrow)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex.arrow complex stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension.arrow extension stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view.arrow view stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_tensor.arrow tensor stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex_file.arrow complex file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension_file.arrow extension file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view_file.arrow view file

      - name: PyArrow roundtrip checks
        run: |
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow.arrow canonical stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow.arrow canonical stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_dict_delta.arrow dict-delta stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree.arrow ree stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree.arrow ree stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int16.arrow ree-int16 stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int64.arrow ree-int64 stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_complex.arrow complex stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_complex.arrow complex stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_complex.arrow complex stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_extension.arrow extension stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_extension.arrow extension stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_extension.arrow extension stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_view.arrow view stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_view.arrow view stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_view.arrow view stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_tensor.arrow tensor stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_file.arrow canonical file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_file.arrow ree file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_file.arrow ree file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_file.arrow ree file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int16_file.arrow ree-int16 file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_ree_int64_file.arrow ree-int64 file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_complex_file.arrow complex file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_complex_file.arrow complex file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_complex_file.arrow complex file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_extension_file.arrow extension file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_extension_file.arrow extension file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_extension_file.arrow extension file
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_view_file.arrow view file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_view_file.arrow view file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_view_file.arrow view file

  interop-pyarrow-cross-platform-smoke:
    name: IPC Interop Smoke (${{ matrix.os }} PyArrow)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["macos-latest", "windows-latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: PyArrow cross-platform smoke (canonical stream+file, tensor stream)
        shell: bash
        run: |
          set -euo pipefail
          python -c "from pathlib import Path; Path('.interop-fixtures').mkdir(exist_ok=True)"
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_tensor.arrow tensor stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow.arrow canonical stream
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/pyarrow.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/pyarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow.arrow canonical stream
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_file.arrow canonical file
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow_tensor.arrow tensor stream

  interop-arrow-rs:
    name: IPC Interop (zarrow <-> arrow-rs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.14.1"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate zarrow fixtures
        run: |
          mkdir -p .interop-fixtures
          zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow canonical stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree.arrow ree stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex.arrow complex stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension.arrow extension stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view.arrow view stream
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_file.arrow canonical file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_file.arrow ree file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_ree_int64_file.arrow ree-int64 file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_complex_file.arrow complex file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_extension_file.arrow extension file
          zig build interop-fixture-writer -- .interop-fixtures/zarrow_view_file.arrow view file

      - name: Arrow-RS roundtrip checks
        run: |
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs.arrow canonical stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs.arrow canonical stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow.arrow canonical stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_dict_delta.arrow dict-delta stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_dict_delta.arrow dict-delta stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_dict_delta.arrow dict-delta stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_ree.arrow ree stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree.arrow ree stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_ree.arrow ree stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_ree_int16.arrow ree-int16 stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int16.arrow ree-int16 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_ree_int16.arrow ree-int16 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_ree_int64.arrow ree-int64 stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int64.arrow ree-int64 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_ree_int64.arrow ree-int64 stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_complex.arrow complex stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_complex.arrow complex stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_complex.arrow complex stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_extension.arrow extension stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_extension.arrow extension stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_extension.arrow extension stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_view.arrow view stream
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_view.arrow view stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_view.arrow view stream
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_file.arrow canonical file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_file.arrow canonical file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_file.arrow canonical file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_ree_file.arrow ree file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_file.arrow ree file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_ree_file.arrow ree file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- generate .interop-fixtures/arrow_rs_ree_int16_file.arrow ree-int16 file
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs_ree_int16_file.arrow ree-int16 file
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml --bin zarrow-interop-arrow-rs -- validate .interop-fixtures/zarrow_ree_int16_file.arrow ree-int16 file
