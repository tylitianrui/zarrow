name: CI

on:
  push:
    branches: [ "master"]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test on ${{ matrix.os }} with Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        zig: ["0.15.1", "0.15.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "${{ matrix.zig }}"

      - name: Run tests
        run: zig build test

  pyarrow-fixture-check:
    name: PyArrow Fixture Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Regenerate IPC fixtures
        run: python tools/generate_ipc_fixtures.py

      - name: Ensure fixtures are up to date
        run: git diff --exit-code -- src/ipc/testdata

  interop-matrix:
    name: IPC Interop Matrix (zarrow <-> pyarrow/arrow-rs/arrow-cpp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyArrow
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyarrow==23.0.1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Conda (arrow-cpp)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: false
          activate-environment: arrow-cpp-env
          channels: conda-forge
          python-version: "3.11"

      - name: Install Arrow C++ toolchain
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          conda install -y arrow-cpp pkg-config cxx-compiler

      - name: Build C++ interop tool
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          mkdir -p .interop-bin
          c++ -std=c++17 tools/interop/cpp/interop.cpp -o .interop-bin/interop_cpp $(pkg-config --cflags --libs arrow)

      - name: Prepare fixture directory
        run: mkdir -p .interop-fixtures

      - name: Generate zarrow fixture
        run: zig build interop-fixture-writer -- .interop-fixtures/zarrow.arrow

      - name: PyArrow roundtrip checks
        run: |
          python tools/interop/pyarrow_generate.py .interop-fixtures/pyarrow.arrow
          zig build interop-fixture-check -- .interop-fixtures/pyarrow.arrow
          python tools/interop/pyarrow_validate.py .interop-fixtures/zarrow.arrow

      - name: Arrow-RS roundtrip checks
        run: |
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- generate .interop-fixtures/arrow_rs.arrow
          zig build interop-fixture-check -- .interop-fixtures/arrow_rs.arrow
          cargo run --manifest-path tools/interop/arrow-rs/Cargo.toml -- validate .interop-fixtures/zarrow.arrow

      - name: Arrow C++ roundtrip checks
        shell: bash -l {0}
        run: |
          conda activate arrow-cpp-env
          ./.interop-bin/interop_cpp generate .interop-fixtures/arrow_cpp.arrow
          zig build interop-fixture-check -- .interop-fixtures/arrow_cpp.arrow
          ./.interop-bin/interop_cpp validate .interop-fixtures/zarrow.arrow
